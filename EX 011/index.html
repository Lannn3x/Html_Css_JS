<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="L.ico" type="image/x-icon">
    <title>EX 011</title>
</head>
<body>
    <h1>Imagem Dinamica 💫</h1>
    <p>Tente abrir esse site em varios dispositivos para ver a imagem mudar de tamanho!</p>
    
<picture>
    <source media="(max-width: 750px)" srcset="img/foto-p.png" type="image/png">
    <source media="(max-width: 1050px )" srcset="img/foto-m.png" type="image/png">
    <img src="img/foto-g.png" alt="PNG grande flexivel">
</picture>
<hr>
<h1> Audio 🎼</h1>
<p>Vamos Produzir um auido em um site HTML ?</p>
<audio preload="metadata" controls>
    <source src="midia/audio.mp3" type="audio/mpeg">
    <source src="midia/audio.ogg" type="audio/ogg">
    <source src="midia/audio.wav" type="audio/wav">
    <p>Seu Navegador Não Suporta O Elemento De Áudio 😭. <a href="media/audio.mp3"> Clique Para Baixar o audio 🔔</a></p>
</audio>


</body>
</html>
